# =============================================================================
# EasyObs — single-node application (api + web).
#
# 사용:
#   docker compose -f docker-compose.deps.yml -f docker-compose.app.yml --env-file .env up -d
#
# 단일 컨테이너 1대에 API+Web 을 띄운다. 데이터는 위 compose 의 Postgres 와
# 로컬 named volume `easyobs_blob` 에 저장.
# =============================================================================

services:
  easyobs-api:
    image: ${EASYOBS_API_IMAGE}
    container_name: easyobs-api
    env_file:
      - .env
    environment:
      EASYOBS_DATA_DIR: /var/lib/easyobs
      EASYOBS_STORAGE_FORMAT: "${EASYOBS_STORAGE_FORMAT:-parquet}"
      EASYOBS_QUERY_ENGINE: "${EASYOBS_QUERY_ENGINE:-duckdb}"
      # Hybrid blob store: 로컬(최근 7일) + S3(전체 아카이브) 동시 기록.
      # EASYOBS_BLOB_PROVIDER=hybrid 로 설정 시 활성화.
      EASYOBS_BLOB_PROVIDER: "${EASYOBS_BLOB_PROVIDER:-local}"
      EASYOBS_BLOB_BUCKET: "${EASYOBS_BLOB_BUCKET:-}"
      EASYOBS_BLOB_PREFIX: "${EASYOBS_BLOB_PREFIX:-traces}"
      EASYOBS_BLOB_REGION: "${EASYOBS_BLOB_REGION:-}"
      EASYOBS_BLOB_S3_ACCESS_KEY_ID: "${EASYOBS_BLOB_S3_ACCESS_KEY_ID:-}"
      EASYOBS_BLOB_S3_SECRET_ACCESS_KEY: "${EASYOBS_BLOB_S3_SECRET_ACCESS_KEY:-}"
      EASYOBS_BLOB_HOT_RETENTION_DAYS: "${EASYOBS_BLOB_HOT_RETENTION_DAYS:-7}"
      # 단일 노드에서는 alarm evaluator 를 그대로 한 인스턴스에서 돌린다.
      EASYOBS_ALARM_ENABLED: "${EASYOBS_ALARM_ENABLED:-true}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - easyobs_blob:/var/lib/easyobs
    ports:
      - "${EASYOBS_API_HOST_PORT:-8787}:8787"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8787/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  easyobs-web:
    image: ${EASYOBS_WEB_IMAGE}
    container_name: easyobs-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8787}
    depends_on:
      easyobs-api:
        condition: service_healthy
    ports:
      - "${EASYOBS_WEB_HOST_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  easyobs_blob:
