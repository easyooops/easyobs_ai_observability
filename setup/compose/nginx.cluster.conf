# =============================================================================
# EasyObs cluster — Nginx HTTP load balancer.
#
# 같은 노드(또는 단일 VM) 안에서 API 컨테이너 N대 + leader 1대를 라운드로빈
# 분산하는 구성. 클라우드 ALB 를 쓰는 클러스터(Terraform cluster/) 에서는
# 이 파일이 필요 없다.
#
# - leader 컨테이너(easyobs-api-leader)는 alarm evaluator 만 활성화된
#   단일 인스턴스로, ingest/HTTP 트래픽도 동일하게 받는다.
# - worker 컨테이너(easyobs-api-worker_*)는 ALARM_ENABLED=false 로 띄운다.
# =============================================================================

events {
  worker_connections 4096;
}

http {
  log_format combined_with_upstream
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'upstream=$upstream_addr rt=$request_time uct=$upstream_connect_time '
    'urt=$upstream_response_time';

  access_log /var/log/nginx/access.log combined_with_upstream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 32m;

  upstream easyobs_api {
    least_conn;
    # docker compose service name 으로 컨테이너 N대를 자동 분산.
    # `replicas` 로 띄운 컨테이너는 동일 hostname 으로 DNS round-robin 됨.
    server easyobs-api-leader:8787 max_fails=3 fail_timeout=10s;
    server easyobs-api-worker:8787 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream easyobs_web {
    server easyobs-web:3000 max_fails=3 fail_timeout=10s;
    keepalive 16;
  }

  server {
    listen 80 default_server;

    # OTLP/HTTP ingest, REST API, OpenAPI docs 모두 /v1, /otlp, /healthz, /docs
    # 로 들어오므로 prefix 단위로 라우팅. 그 외는 Web 콘솔로.
    location ~ ^/(v1|otlp|healthz|docs|openapi.json) {
      proxy_pass http://easyobs_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    location / {
      proxy_pass http://easyobs_web;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
