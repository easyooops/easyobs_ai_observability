<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyObs Documentation</title>
<script>
(function() {
  var STORAGE_KEY = 'easyobs.uiLocale';
  var lang = 'en';
  try {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored === 'ko') lang = 'kr';
  } catch(e) {}
  var page = 'index.html';
  var params = window.location.search;
  var hash = window.location.hash;
  if (params) {
    var match = params.match(/[?&]page=([^&]+)/);
    if (match) page = decodeURIComponent(match[1]);
  }
  window.location.replace('/docs/' + lang + '/' + page + hash);
})();
</script>
</head>
<body>
<p>Redirecting to documentation...</p>
</body>
</html>
